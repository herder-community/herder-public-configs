apiVersion: telemetry.herder.io/v1alpha1
kind: TelemetryProfile
metadata:
  name: tr181-multiap
spec:
  priority: 10
  deviceSelector:
    matchExpressions:
      - key: "dataModel:device"
        operator: Exists
  parameters:
    - path: "Device.WiFi.MultiAP.APDevice.*.MACAddress"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.Manufacturer"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.ManufacturerOUI"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.ModelName"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.SerialNumber"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.SoftwareVersion"
      interval: 0
    # Backhaul link RSSI from this extender to its parent controller
    # (the gateway). Used by the topology enrichment script to colour
    # the gateway→extender edge by signal strength.
    - path: "Device.WiFi.MultiAP.APDevice.*.SignalStrength"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.Radio.*.Enable"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.Radio.*.OperatingFrequencyBand"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.Radio.*.Channel"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.Radio.*.AP.*.BSSID"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.Radio.*.AP.*.SSID"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.Radio.*.AP.*.AssociatedDevice.*.MACAddress"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.Radio.*.AP.*.AssociatedDevice.*.SignalStrength"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.Radio.*.AP.*.AssociatedDevice.*.LastDataDownlinkRate"
      interval: 0
    - path: "Device.WiFi.DataElements.Network.ID"
      interval: 0
    - path: "Device.WiFi.DataElements.Network.ControllerID"
      interval: 0
    - path: "Device.WiFi.DataElements.Network.Device.*.ID"
      interval: 0
    - path: "Device.WiFi.DataElements.Network.Device.*.Manufacturer"
      interval: 0
