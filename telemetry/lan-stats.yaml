# Telemetry profile: LAN ethernet interface byte counters for ARRIS NVG devices.
#
# Collects BytesSent / BytesReceived across all LAN Ethernet interfaces on
# every CWMP session. interval=0 means "collect on every session" (passive
# collection — no active scheduling via Connection Request).
#
# Dev/test profile for validating the #278 CWMP session telemetry phase.
# Operators should replace or augment this with their own profiles.
name: arris-lan-stats
priority: 10

deviceSelector:
  matchLabels:
    oui: "0000C5"

parameters:
  - path: "InternetGatewayDevice.LANDevice.*.LANEthernetInterfaceConfig.*.Stats.BytesSent"
    interval: 0
  - path: "InternetGatewayDevice.LANDevice.*.LANEthernetInterfaceConfig.*.Stats.BytesReceived"
    interval: 0
