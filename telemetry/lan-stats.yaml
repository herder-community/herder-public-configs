name: lan-ethernet-stats
priority: 10
deviceSelector: {}
parameters:
  - path: InternetGatewayDevice.LANDevice.*.LANEthernetInterfaceConfig.*.Stats.BytesSent
    interval: 0
  - path: InternetGatewayDevice.LANDevice.*.LANEthernetInterfaceConfig.*.Stats.BytesReceived
    interval: 0
  - path: InternetGatewayDevice.LANDevice.*.LANEthernetInterfaceConfig.*.Stats.PacketsSent
    interval: 0
  - path: InternetGatewayDevice.LANDevice.*.LANEthernetInterfaceConfig.*.Stats.PacketsReceived
    interval: 0
  - path: InternetGatewayDevice.LANDevice.*.LANEthernetInterfaceConfig.*.Stats.ErrorsSent
    interval: 0
  - path: InternetGatewayDevice.LANDevice.*.LANEthernetInterfaceConfig.*.Stats.ErrorsReceived
    interval: 0
