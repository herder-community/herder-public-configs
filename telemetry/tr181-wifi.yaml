# Telemetry profile: TR-181 WiFi — Radio + SSID + AccessPoint bundle.
#
# TR-181 splits WiFi into 3 orthogonal objects (vs TR-098's single
# WLANConfiguration):
#
#   * Device.WiFi.Radio.*       — physical radio (channel, band,
#                                 byte counters)
#   * Device.WiFi.SSID.*        — SSID interfaces (enable, BSSID,
#                                 byte counters live HERE, not on
#                                 Radio)
#   * Device.WiFi.AccessPoint.* — AP config (security mode,
#                                 SSID advertisement, associated
#                                 clients)
#
# Device.WiFi.EndPoint.* (CPE acting as a STA in client mode) is
# deliberately excluded — rare on CPE, operator concern if needed.
#
# TR-181-vs-TR-098 schema divergences on associated clients
# (intentional, documented here so operators reading this YAML
# aren't surprised):
#
#   * MACAddress (NOT AssociatedDeviceMACAddress)
#   * AuthenticationState (NOT AssociatedDeviceAuthenticationState)
#   * LastDataDownlinkRate + LastDataUplinkRate (TR-181 splits
#     direction; TR-098 had single LastDataTransmitRate)
#   * SignalStrength IS a standard TR-181 parameter — in TR-098 it
#     was a vendor extension (X_<VENDOR>_SignalStrength). Ships in
#     the baseline because it's the single most operator-visible
#     WiFi metric.
#   * No AssociatedDevice.IPAddress — TR-181 dropped it. Dashboards
#     correlate client IP via MAC join to Device.Hosts.Host.*.
#
# Security-sensitive paths (KeyPassphrase, PreSharedKey, WEPKey,
# RadiusSecret) deliberately excluded — CPEs should return blank,
# and shipping them in the baseline is an audit-log footgun.
#
# Byte counters only (Stats.BytesSent/BytesReceived) on Radio and
# SSID — packet counters (Errors, Discards, Unicast, Multicast,
# Broadcast) excluded as operationally low-value.
#
# All params interval=0 (passive — one GPV per natural Inform session,
# no Connection Request scheduling).
#
# Scope: any TR-181-capable CPE (matched via dataModel:device label
# written by the CWMP handler's detectDataModels helper — see #321).
# Binds on the first qualifying Inform.
#
# Priority 10 — operator-shipped vendor profiles (typical priority 50+)
# override on conflicting paths.
apiVersion: telemetry.herder.io/v1alpha1
kind: TelemetryProfile
metadata:
  name: tr181-wifi
spec:
  priority: 10
  deviceSelector:
    matchExpressions:
      - key: "dataModel:device"
        operator: Exists
  parameters:
    # --- Radio state ---
    - path: "Device.WiFi.Radio.*.Enable"
      interval: 0
    - path: "Device.WiFi.Radio.*.Status"
      interval: 0
    - path: "Device.WiFi.Radio.*.OperatingFrequencyBand"
      interval: 0
    - path: "Device.WiFi.Radio.*.Channel"
      interval: 0
    - path: "Device.WiFi.Radio.*.OperatingStandards"
      interval: 0
    - path: "Device.WiFi.Radio.*.OperatingChannelBandwidth"
      interval: 0
    # --- Radio byte counters ---
    - path: "Device.WiFi.Radio.*.Stats.BytesSent"
      interval: 0
    - path: "Device.WiFi.Radio.*.Stats.BytesReceived"
      interval: 0
    # --- SSID interface state + byte counters ---
    - path: "Device.WiFi.SSID.*.Enable"
      interval: 0
    - path: "Device.WiFi.SSID.*.Status"
      interval: 0
    - path: "Device.WiFi.SSID.*.SSID"
      interval: 0
    - path: "Device.WiFi.SSID.*.BSSID"
      interval: 0
    - path: "Device.WiFi.SSID.*.LowerLayers"
      interval: 0
    - path: "Device.WiFi.SSID.*.Stats.BytesSent"
      interval: 0
    - path: "Device.WiFi.SSID.*.Stats.BytesReceived"
      interval: 0
    # --- AccessPoint config + security mode ---
    - path: "Device.WiFi.AccessPoint.*.Enable"
      interval: 0
    - path: "Device.WiFi.AccessPoint.*.SSIDReference"
      interval: 0
    - path: "Device.WiFi.AccessPoint.*.SSIDAdvertisementEnabled"
      interval: 0
    - path: "Device.WiFi.AccessPoint.*.Security.ModeEnabled"
      interval: 0
    - path: "Device.WiFi.AccessPoint.*.AssociatedDeviceNumberOfEntries"
      interval: 0
    # --- Associated clients (TR-181 spellings) ---
    - path: "Device.WiFi.AccessPoint.*.AssociatedDevice.*.MACAddress"
      interval: 0
    - path: "Device.WiFi.AccessPoint.*.AssociatedDevice.*.AuthenticationState"
      interval: 0
    - path: "Device.WiFi.AccessPoint.*.AssociatedDevice.*.LastDataDownlinkRate"
      interval: 0
    - path: "Device.WiFi.AccessPoint.*.AssociatedDevice.*.LastDataUplinkRate"
      interval: 0
    - path: "Device.WiFi.AccessPoint.*.AssociatedDevice.*.SignalStrength"
      interval: 0
    - path: "Device.WiFi.AccessPoint.*.AssociatedDevice.*.Active"
      interval: 0
