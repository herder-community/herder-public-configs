# Telemetry add-ons for the cpe-labs TR-098 simulator
# (github.com/herder-labs/cpe-labs, profile example-tr098-gateway).
#
# The bundled tr098-wifi profile deliberately excludes SignalStrength
# because most field TR-098 firmware exposes signal as a vendor
# X_<VENDOR>_SignalStrength extension. The lab simulator emits it on
# the standard SignalStrength path, so add it here scoped to the
# simulator's ProductClass to keep the generic profile clean.
apiVersion: telemetry.herder.io/v1alpha1
kind: TelemetryProfile
metadata:
  name: cpe-sim-tr098-extras
spec:
  priority: 50
  deviceSelector:
    matchLabels:
      productClass: "GenericIGD"
  parameters:
    - path: "InternetGatewayDevice.LANDevice.*.WLANConfiguration.*.AssociatedDevice.*.SignalStrength"
      interval: 0
