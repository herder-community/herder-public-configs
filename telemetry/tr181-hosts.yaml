# Telemetry profile: TR-181 connected hosts table.
#
# Per-device table of clients currently or recently associated with
# the gateway — wired and wireless. Covers Active flag, hostname, IP,
# MAC, address source, and Layer1/Layer3 interface back-references.
#
# TR-181-vs-TR-098 schema divergences (intentional, documented here
# so operators reading this YAML aren't surprised):
#
#   * PhysAddress (NOT MACAddress) — TR-181 renamed the canonical
#     MAC field on Device.Hosts.Host.*. The legacy MACAddress is
#     absent from TR-181.
#   * Layer1Interface + Layer3Interface (NOT Layer2Interface) —
#     TR-181 split the single Layer2Interface back-reference
#     (from TR-098) into two references. Collect both so dashboards
#     can correlate hosts with WiFi radios (Layer1) AND with IP
#     interfaces (Layer3).
#
# LeaseTimeRemaining deliberately excluded — it counts down every
# second, a poor time-series fit (pure noise in the history
# hypertable). Matches #315's tr098-lan-hosts.yaml exclusion.
#
# All params interval=0 (passive — one GPV per natural Inform session,
# no Connection Request scheduling).
#
# Scope: any TR-181-capable CPE (matched via dataModel:device label
# written by the CWMP handler's detectDataModels helper — see #321).
# Binds on the first qualifying Inform.
#
# Priority 10 — operator-shipped vendor profiles (typical priority 50+)
# override on conflicting paths.
name: tr181-hosts
priority: 10
deviceSelector:
  matchExpressions:
    - key: "dataModel:device"
      operator: Exists

parameters:
  # --- Table cardinality ---
  - path: "Device.Hosts.HostNumberOfEntries"
    interval: 0

  # --- Per-host fields (TR-181 spellings) ---
  - path: "Device.Hosts.Host.*.Active"
    interval: 0
  - path: "Device.Hosts.Host.*.HostName"
    interval: 0
  - path: "Device.Hosts.Host.*.IPAddress"
    interval: 0
  - path: "Device.Hosts.Host.*.PhysAddress"
    interval: 0
  - path: "Device.Hosts.Host.*.AddressSource"
    interval: 0
  - path: "Device.Hosts.Host.*.Layer1Interface"
    interval: 0
  - path: "Device.Hosts.Host.*.Layer3Interface"
    interval: 0
