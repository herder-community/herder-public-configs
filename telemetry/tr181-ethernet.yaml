# Telemetry profile: TR-181 Ethernet interfaces.
#
# Covers both LAN and WAN Ethernet — TR-181 has no WANDevice.*
# namespace, so the WAN-vs-LAN split is carried by the per-interface
# Upstream boolean flag. Dashboards filter on Upstream=true (WAN)
# vs Upstream=false (LAN) at query time.
#
# Byte counters only (BytesSent/BytesReceived) — packet counters
# (Errors, Discards, Unicast, Multicast, Broadcast) excluded as
# operationally low-value, matching #315's tr098-lan-eth.yaml stance.
#
# All params interval=0 (passive — one GPV per natural Inform session,
# no Connection Request scheduling).
#
# Scope: any TR-181-capable CPE (matched via dataModel:device label
# written by the CWMP handler's detectDataModels helper — see #321).
# Binds on the first qualifying Inform.
#
# Priority 10 — operator-shipped vendor profiles (typical priority 50+)
# override on conflicting paths.
name: tr181-ethernet
priority: 10
deviceSelector:
  matchExpressions:
    - key: "dataModel:device"
      operator: Exists

parameters:
  - path: "Device.Ethernet.Interface.*.Status"
    interval: 0
  - path: "Device.Ethernet.Interface.*.Upstream"
    interval: 0
  - path: "Device.Ethernet.Interface.*.MACAddress"
    interval: 0
  - path: "Device.Ethernet.Interface.*.LowerLayers"
    interval: 0
  - path: "Device.Ethernet.Interface.*.Stats.BytesSent"
    interval: 0
  - path: "Device.Ethernet.Interface.*.Stats.BytesReceived"
    interval: 0
