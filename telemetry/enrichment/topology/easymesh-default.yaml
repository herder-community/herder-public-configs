# Default topology rule for TR-181 EasyMesh / MultiAP devices.
#
# Walks Device.WiFi.MultiAP.APDevice.{i}.Radio.{j}.AP.{k}.AssociatedDevice.{l}
# to assemble the mesh node graph. APDevice entries are paired
# extenders; the gateway is the managed CPE itself. Each extender
# wires back to the gateway as a wifi_backhaul edge.
#
# Targets the MultiAP path tree (broad firmware compatibility, what
# cpe-labs sim emits). The newer Device.WiFi.DataElements.Network.*
# tree is a separately-modeled view of the same data; firmware
# typically exposes both. A DataElements-specific default can ship as
# a follow-up if operators need it.
#
# Clients walk AssociatedDevice tables per radio. Hostname / IPv4 /
# IPv6 cross-ref Device.Hosts.Host.* by MAC.
#
# Cost: triggerPaths gates on the wifi / hosts subtree so unrelated
# Informs skip the script entirely. changeHash on structural fields
# (APDevice MACs, AssociatedDevice MACs, Hosts MAC list) so
# topology-irrelevant Inform churn collapses to skipped_unchanged.
name: easymesh-topology-default
priority: 100
deviceSelector:
  # dataModel:device is in the existing label set
  # (provisioning.BuildProvisioningLabels) for any device observed
  # reporting Device.* paths. triggerPaths below narrows execution to
  # actual MultiAP-bearing Informs.
  matchExpressions:
    - key: dataModel:device
      operator: Exists

triggerPaths:
  # WORKAROUND for the multi-event-per-session race: cwmp publishes
  # a single CPE session as several telemetry events (small periodic
  # Inform first, then the 250-leaf GPV batch). The periodic Inform
  # carries `Device.WiFi.AccessPoint.{i}.AssociatedDeviceNumberOfEntries`
  # which would match a `Device.WiFi.AccessPoint.*` trigger — the
  # script then runs against an event that doesn't carry the gateway
  # anchors it needs, bails at "no canonical TR-181 MAC", commits
  # gate state, and the immediately-following GPV-results event is
  # coalesce-skipped. Topology never emits.
  # Gating only on paths that appear EXCLUSIVELY in the GPV batch
  # (MultiAP.APDevice.* and Hosts.Host.*) routes the script to the
  # right event. Long-term fix tracked separately.
  - "Device.WiFi.MultiAP.APDevice.*"
  - "Device.Hosts.Host.*"

changeHash:
  paths:
    - "Device.WiFi.AccessPoint.*.AssociatedDevice.*.MACAddress"
    - "Device.WiFi.MultiAP.APDevice.*.MACAddress"
    - "Device.WiFi.MultiAP.APDevice.*.Radio.*.AP.*.AssociatedDevice.*.MACAddress"
    - "Device.Hosts.Host.*.PhysAddress"

coalesceWindow: 60s

config:
  # rssiEncoding: "dbm" (default for MultiAP) or "rcpi". RCPI converts
  # via (RCPI/2) - 110.
  rssiEncoding: dbm
  # includeInactiveHosts: when false (default), Hosts.Host.{j}.Active
  # gates client emission so disconnected clients drop out.
  includeInactiveHosts: false

script: easymesh-default.ts
