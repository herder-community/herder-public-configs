# Reference dashboard for TR-098-speaking CPEs.
#
# Operator-built dashboards are stored as a Config Service content type
# alongside provisioning / mapping / telemetry / etc. This file is the
# minimal baseline shipped by Herder so the per-device resolver has
# something to resolve to from day one.
#
# Replace the text panel with Line / Bar / Stat / Pie / Gauge / Table
# panels as the panel registry grows. Until then `text` is the only
# registered panel kind.
#
# Selector vocabulary: data-model membership is emitted as exists-style
# keys with empty string values. TR-098 devices report the data model id
# `igd`; TR-181 devices report `device`. Operators target a specific
# data model with `matchExpressions: [{ key: "dataModel:<id>",
# operator: Exists }]`. `matchLabels: { dataModel: tr098 }` does NOT
# work, there is no such key/value pair in the label map.
apiVersion: dashboards.herder.io/v1alpha1
kind: Dashboard
metadata:
  name: tr098-overview
spec:
  title: TR-098 Device Overview
  description: |
    Reference dashboard for TR-098-speaking CPEs. Scoped to devices that
    report the TR-098 (`igd`) data model via the `dataModel:igd` exists
    expression.
  deviceSelector:
    matchExpressions:
      - {key: "dataModel:igd", operator: Exists}
  defaultTimeRange:
    from: {kind: relative, expr: "now-1h"}
    to: {kind: relative, expr: "now"}
  defaultRefreshIntervalMs: 60000
  panels:
    - id: panel-info
      kind: text
      title: Welcome
      layout: {x: 0, y: 0, w: 12, h: 4}
      queries:
        - refId: A
          version: 1
          datasource: device_parameters
          query:
            agg: count
            filters:
              path: "InternetGatewayDevice.DeviceInfo.SoftwareVersion"
      config: {showSeriesCount: true}
---
# Per-client WiFi signal strength, active client count, and cumulative
# steering-event counters per client. Built on the labeled telemetry
# pipeline, one row per associated client (labels: client_mac, hostname,
# band, via, wlan_idx).
#
# Selector: TR-098 devices, identified by the `dataModel:igd` exists
# expression. Same scoping convention as tr098-overview.yaml.
apiVersion: dashboards.herder.io/v1alpha1
kind: Dashboard
metadata:
  name: tr098-wifi
spec:
  title: WiFi
  description: |
    Per-client WiFi signal strength, active client counts, and cumulative
    steering-event counters per client. One line per associated client MAC.
  deviceSelector:
    matchExpressions:
      - {key: "dataModel:igd", operator: Exists}
  defaultTimeRange:
    from: {kind: relative, expr: "now-1h"}
    to: {kind: relative, expr: "now"}
  defaultRefreshIntervalMs: 60000
  panels:
    - id: panel-rssi
      kind: line
      title: Client signal strength (RSSI)
      layout: {x: 0, y: 0, w: 12, h: 6}
      queries:
        - refId: A
          version: 1
          datasource: telemetry_history_labeled
          query:
            agg: avg
            filters:
              metric: wifi.client.rssi
            group_by: ["labels.client_mac"]
      config:
        showPoints: false
        interpolation: monotone
        yAxis: {kind: fixed, min: -100, max: -20}
        unit: " dBm"
        legend:
          displayMode: table
          placement: right
          calcs: [last, mean, min, max]
    # Per-band RSSI radars (#434). One radar each for 2.4 / 5 / 6 GHz.
    # Each is a polar snapshot of every client currently associated on
    # that band, painted against operator-defined threshold rings (good
    # / OK / average / bad / critical). The radar is band-agnostic —
    # band scoping is purely the per-panel query's label_filters
    # (`band == "2.4GHz"` etc.). Sits alongside the line chart above so
    # operators get both at-a-glance bucketing AND time-series history.
    - id: panel-rssi-radar-2_4ghz
      kind: radar
      title: WiFi 2.4 GHz client signals
      layout: {x: 0, y: 6, w: 4, h: 6}
      queries:
        - refId: A
          version: 1
          datasource: telemetry_history_labeled
          query:
            agg: last
            filters:
              metric: wifi.client.rssi
              label_filters:
                - {key: band, op: eq, value: "2.4GHz"}
            group_by: ["labels.client_mac"]
      config:
        domain: {min: -100, max: -20}
        thresholds:
          - {at: -100, color: "#ef4444", label: "Critical"}
          - {at: -85, color: "#f97316", label: "Bad"}
          - {at: -75, color: "#eab308", label: "Average"}
          - {at: -65, color: "#84cc16", label: "OK"}
          - {at: -50, color: "#22c55e", label: "Great"}
        thresholdAlpha: 0.28
        unit: " dBm"
        defaultIcon: Wifi
        clientIcons: {}
        showLegend: true
        maxAxes: 24
        truncationMode: "worst-n"
    - id: panel-rssi-radar-5ghz
      kind: radar
      title: WiFi 5 GHz client signals
      layout: {x: 4, y: 6, w: 4, h: 6}
      queries:
        - refId: A
          version: 1
          datasource: telemetry_history_labeled
          query:
            agg: last
            filters:
              metric: wifi.client.rssi
              label_filters:
                - {key: band, op: eq, value: "5GHz"}
            group_by: ["labels.client_mac"]
      config:
        domain: {min: -100, max: -20}
        thresholds:
          - {at: -100, color: "#ef4444", label: "Critical"}
          - {at: -85, color: "#f97316", label: "Bad"}
          - {at: -75, color: "#eab308", label: "Average"}
          - {at: -65, color: "#84cc16", label: "OK"}
          - {at: -50, color: "#22c55e", label: "Great"}
        thresholdAlpha: 0.28
        unit: " dBm"
        defaultIcon: Wifi
        clientIcons: {}
        showLegend: true
        maxAxes: 24
        truncationMode: "worst-n"
    - id: panel-rssi-radar-6ghz
      kind: radar
      title: WiFi 6 GHz client signals
      layout: {x: 8, y: 6, w: 4, h: 6}
      queries:
        - refId: A
          version: 1
          datasource: telemetry_history_labeled
          query:
            agg: last
            filters:
              metric: wifi.client.rssi
              label_filters:
                - {key: band, op: eq, value: "6GHz"}
            group_by: ["labels.client_mac"]
      config:
        domain: {min: -100, max: -20}
        thresholds:
          - {at: -100, color: "#ef4444", label: "Critical"}
          - {at: -85, color: "#f97316", label: "Bad"}
          - {at: -75, color: "#eab308", label: "Average"}
          - {at: -65, color: "#84cc16", label: "OK"}
          - {at: -50, color: "#22c55e", label: "Great"}
        thresholdAlpha: 0.28
        unit: " dBm"
        defaultIcon: Wifi
        clientIcons: {}
        showLegend: true
        maxAxes: 24
        truncationMode: "worst-n"
    - id: panel-clients-by-band
      # Re-anchored from y=6 to y=12 to make room for the three radars above.
      # (the original Active WiFi clients panel below was at y=6 — bumped down.)
      kind: line
      title: Active WiFi clients
      layout: {x: 0, y: 12, w: 12, h: 4}
      queries:
        - refId: A
          version: 1
          datasource: telemetry_history_labeled
          query:
            agg: count
            filters:
              metric: wifi.client.rssi
      config:
        showPoints: false
        interpolation: step
        yAxis: {kind: auto}
        unit: null
        legend:
          displayMode: hidden
          placement: bottom
          calcs: []
    - id: panel-self-steer
      kind: line
      title: Cumulative self-steer count per client
      layout: {x: 0, y: 16, w: 6, h: 5}
      queries:
        - refId: A
          version: 1
          datasource: telemetry_history_labeled
          query:
            agg: last
            filters:
              metric: wifi.client.self_steer_count
            group_by: ["labels.client_mac"]
      config:
        showPoints: false
        interpolation: monotone
        yAxis: {kind: auto}
        unit: null
        legend:
          displayMode: table
          placement: bottom
          calcs: [last, max]
    - id: panel-steering-unfriendly
      kind: line
      title: Steering-unfriendly events per client
      layout: {x: 6, y: 16, w: 6, h: 5}
      queries:
        - refId: A
          version: 1
          datasource: telemetry_history_labeled
          query:
            agg: last
            filters:
              metric: wifi.client.steering_unfriendly
            group_by: ["labels.client_mac"]
      config:
        showPoints: false
        interpolation: monotone
        yAxis: {kind: auto}
        unit: null
        legend:
          displayMode: table
          placement: bottom
          calcs: [last, max]
---
# Fleet-wide overview. KPIs and distribution panels query the `devices`
# datasource directly so the fleet shape (total / lifecycle / firmware /
# manufacturer / model) reflects what's actually in the devices table,
# not what each CPE happens to have reported as a parameter row.
# Prometheus drives the platform activity row; telemetry_history /
# telemetry_history_labeled drive the detail row.
apiVersion: dashboards.herder.io/v1alpha1
kind: Dashboard
metadata:
  name: tr098-fleet-overview
spec:
  title: Fleet overview
  description: |
    Total / active / bootstrapping / decommissioned counts, lifecycle
    distribution, top firmware versions, platform activity from
    Prometheus, and a sortable table of devices by latest WiFi RSSI.
  defaultTimeRange:
    from: {kind: relative, expr: "now-24h"}
    to: {kind: relative, expr: "now"}
  defaultRefreshIntervalMs: 60000
  panels:
    # ── KPI row ────────────────────────────────────────────────────────
    - id: panel-fleet-count
      kind: stat
      title: Total devices
      description: All known devices across every lifecycle state
      descriptionPlacement: bottom
      layout: {x: 0, y: 0, w: 3, h: 4}
      queries:
        - refId: A
          version: 1
          datasource: devices
          query:
            agg: count
      config:
        unit: null
        format: number
        thresholds: []
        showSparkline: false
        showPriorPeriodDelta: false
        icon: device
    - id: panel-fleet-active
      kind: stat
      title: Active
      description: Healthy and provisioned
      descriptionPlacement: bottom
      layout: {x: 3, y: 0, w: 3, h: 4}
      queries:
        - refId: A
          version: 1
          datasource: devices
          query:
            agg: count
            filters: {lifecycle_state: "provisioned"}
      config:
        unit: null
        format: number
        thresholds: []
        showSparkline: false
        showPriorPeriodDelta: false
        icon: check
    - id: panel-fleet-bootstrap
      kind: stat
      title: Bootstrapping
      description: Awaiting first provisioning
      descriptionPlacement: bottom
      layout: {x: 6, y: 0, w: 3, h: 4}
      queries:
        - refId: A
          version: 1
          datasource: devices
          query:
            agg: count
            filters: {lifecycle_state: "bootstrap"}
      config:
        unit: null
        format: number
        thresholds: []
        showSparkline: false
        showPriorPeriodDelta: false
        icon: clock
    - id: panel-fleet-decommissioned
      kind: stat
      title: Decommissioned
      description: Retired from service
      descriptionPlacement: bottom
      layout: {x: 9, y: 0, w: 3, h: 4}
      queries:
        - refId: A
          version: 1
          datasource: devices
          query:
            agg: count
            filters: {lifecycle_state: "decommissioned"}
      config:
        unit: null
        format: number
        thresholds: []
        showSparkline: false
        showPriorPeriodDelta: false
        icon: pause
    # ── Distribution row ───────────────────────────────────────────────
    - id: panel-fleet-lifecycle
      kind: pie
      title: Lifecycle distribution
      description: Fleet split by current lifecycle state
      layout: {x: 0, y: 4, w: 6, h: 6}
      queries:
        - refId: A
          version: 1
          datasource: devices
          query:
            agg: count
            group_by: ["lifecycle_state"]
      config:
        shape: donut
        labelPosition: none
        unit: null
        legend:
          displayMode: list
          placement: right
          calcs: []
        centerLabel:
          valueSource: total
          caption: devices
    - id: panel-firmware-bar
      kind: bar
      title: Top firmware versions
      description: Devices grouped by reported firmware version
      layout: {x: 6, y: 4, w: 6, h: 6}
      queries:
        - refId: A
          version: 1
          datasource: devices
          query:
            agg: count
            group_by: ["firmware_version"]
      config:
        orientation: horizontal
        stacking: grouped
        showValueLabels: true
        unit: null
        legend:
          displayMode: hidden
          placement: bottom
          calcs: []
    # ── Platform activity row (Prometheus) ─────────────────────────────
    - id: panel-informs-rate
      kind: stat
      title: Informs / sec
      description: 5-minute rate of CWMP Inform events
      descriptionPlacement: bottom
      layout: {x: 0, y: 10, w: 3, h: 4}
      queries:
        - refId: A
          version: 1
          datasource: prometheus
          query:
            promql: "sum(rate(openacs_cwmp_informs_total[5m]))"
            mode: instant
      config:
        unit: null
        format: number
        thresholds: []
        showSparkline: false
        showPriorPeriodDelta: false
        icon: activity
    - id: panel-http-rps
      kind: stat
      title: HTTP req / sec
      description: API request rate (5-min average)
      descriptionPlacement: bottom
      layout: {x: 3, y: 10, w: 3, h: 4}
      queries:
        - refId: A
          version: 1
          datasource: prometheus
          query:
            promql: "sum(rate(openacs_http_requests_total[5m]))"
            mode: instant
      config:
        unit: null
        format: number
        thresholds: []
        showSparkline: false
        showPriorPeriodDelta: false
        icon: server
    - id: panel-session-p95
      kind: stat
      title: Session p95
      description: 95th percentile CWMP session duration
      descriptionPlacement: bottom
      layout: {x: 6, y: 10, w: 3, h: 4}
      queries:
        - refId: A
          version: 1
          datasource: prometheus
          query:
            promql: "histogram_quantile(0.95, sum by (le) (openacs_cwmp_session_duration_seconds_bucket))"
            mode: instant
      config:
        unit: " s"
        format: number
        thresholds: []
        showSparkline: false
        showPriorPeriodDelta: false
        icon: clock
    - id: panel-http-error-rate
      kind: stat
      title: HTTP error rate
      description: Fraction of 5xx responses
      descriptionPlacement: bottom
      layout: {x: 9, y: 10, w: 3, h: 4}
      queries:
        - refId: A
          version: 1
          datasource: prometheus
          query:
            promql: "sum(rate(openacs_http_requests_total{status=~\"5..\"}[5m])) / clamp_min(sum(rate(openacs_http_requests_total[5m])), 1)"
            mode: instant
      config:
        unit: null
        format: percent
        thresholds:
          - {at: 0.01, color: "var(--chart-3)"}
          - {at: 0.05, color: "var(--chart-4)"}
        showSparkline: false
        showPriorPeriodDelta: false
        icon: alert
    # ── Detail row ─────────────────────────────────────────────────────
    - id: panel-uptime-stat
      kind: stat
      title: Avg uptime (current)
      description: Last reported InternetGatewayDevice.DeviceInfo.UpTime
      descriptionPlacement: bottom
      layout: {x: 0, y: 14, w: 4, h: 5}
      queries:
        - refId: A
          version: 1
          datasource: telemetry_history
          query:
            agg: last
            filters: {path: "InternetGatewayDevice.DeviceInfo.UpTime"}
      config:
        unit: null
        format: duration_seconds
        thresholds:
          - {at: 86400, color: "var(--chart-2)"}
          - {at: 604800, color: "var(--chart-1)"}
        showSparkline: false
        showPriorPeriodDelta: false
        icon: clock
    - id: panel-recent-table
      kind: table
      title: Devices by latest WiFi signal
      description: Sortable; last RSSI sample per device
      layout: {x: 4, y: 14, w: 8, h: 5}
      queries:
        - refId: A
          version: 1
          datasource: telemetry_history_labeled
          query:
            agg: last
            filters: {metric: wifi.client.rssi}
            group_by: ["device_id"]
      config:
        columns:
          - {key: "labels.device_id", label: "Device", format: text, align: left}
          - {key: "last", label: "Latest RSSI", format: number, align: right}
          - {key: "count", label: "Samples", format: number, align: right}
        defaultSort: {columnKey: "last", direction: asc}
        density: regular
