# Telemetry profile: TR-181 system identity.
#
# Collects device identity, firmware, and uptime — the minimum set
# needed for fleet identity dashboards and firmware-distribution views.
# TR-181 mirror of tr098-system.yaml.
#
# All params interval=0 (passive — one GPV per natural Inform session,
# no Connection Request scheduling).
#
# Scope: any TR-181-capable CPE (matched via dataModel:device label
# written by the CWMP handler's detectDataModels helper — see #321).
# Binds on the first qualifying Inform (one whose ParameterList
# contains at least one Device.*-rooted path) — data_models is
# persisted before session creation, so the label is available when
# the telemetry phase matches profiles in the same session.
#
# Priority 10 — operator-shipped vendor profiles (typical priority 50+)
# override on conflicting paths.
apiVersion: telemetry.herder.io/v1alpha1
kind: TelemetryProfile
metadata:
  name: tr181-system
spec:
  priority: 10
  deviceSelector:
    matchExpressions:
      - key: "dataModel:device"
        operator: Exists
  parameters:
    - path: "Device.DeviceInfo.HardwareVersion"
      interval: 0
    - path: "Device.DeviceInfo.SoftwareVersion"
      interval: 0
    - path: "Device.DeviceInfo.UpTime"
      interval: 0
    # --- MemoryStatus (TR-181 §DeviceInfo.MemoryStatus) ---
    # Total/Free in KB. Memory-usage dashboards compute
    # (Total - Free) / Total * 100 with NULLIF on the denominator to
    # survive firmware that reports Total=0.
    - path: "Device.DeviceInfo.MemoryStatus.Total"
      interval: 0
    - path: "Device.DeviceInfo.MemoryStatus.Free"
      interval: 0
    # --- ProcessStatus (TR-181 §DeviceInfo.ProcessStatus) ---
    # CPUUsage is a percentage (0-100) averaged across CPUs.
    - path: "Device.DeviceInfo.ProcessStatus.CPUUsage"
      interval: 0
    # --- TemperatureStatus (firmware-dependent; wildcard-safe if absent) ---
    # Name is operator-facing label; Value in °C; Status is Enabled/Disabled/Error.
    - path: "Device.DeviceInfo.TemperatureStatus.TemperatureSensor.*.Name"
      interval: 0
    - path: "Device.DeviceInfo.TemperatureStatus.TemperatureSensor.*.Value"
      interval: 0
    - path: "Device.DeviceInfo.TemperatureStatus.TemperatureSensor.*.Status"
      interval: 0
---
# Telemetry profile: TR-181 WiFi — Radio + SSID + AccessPoint bundle.
#
# TR-181 splits WiFi into 3 orthogonal objects (vs TR-098's single
# WLANConfiguration):
#
#   * Device.WiFi.Radio.*       — physical radio (channel, band,
#                                 byte counters)
#   * Device.WiFi.SSID.*        — SSID interfaces (enable, BSSID,
#                                 byte counters live HERE, not on
#                                 Radio)
#   * Device.WiFi.AccessPoint.* — AP config (security mode,
#                                 SSID advertisement, associated
#                                 clients)
#
# Device.WiFi.EndPoint.* (CPE acting as a STA in client mode) is
# deliberately excluded — rare on CPE, operator concern if needed.
#
# TR-181-vs-TR-098 schema divergences on associated clients
# (intentional, documented here so operators reading this YAML
# aren't surprised):
#
#   * MACAddress (NOT AssociatedDeviceMACAddress)
#   * AuthenticationState (NOT AssociatedDeviceAuthenticationState)
#   * LastDataDownlinkRate + LastDataUplinkRate (TR-181 splits
#     direction; TR-098 had single LastDataTransmitRate)
#   * SignalStrength IS a standard TR-181 parameter — in TR-098 it
#     was a vendor extension (X_<VENDOR>_SignalStrength). Ships in
#     the baseline because it's the single most operator-visible
#     WiFi metric.
#   * No AssociatedDevice.IPAddress — TR-181 dropped it. Dashboards
#     correlate client IP via MAC join to Device.Hosts.Host.*.
#
# Security-sensitive paths (KeyPassphrase, PreSharedKey, WEPKey,
# RadiusSecret) deliberately excluded — CPEs should return blank,
# and shipping them in the baseline is an audit-log footgun.
#
# Byte counters only (Stats.BytesSent/BytesReceived) on Radio and
# SSID — packet counters (Errors, Discards, Unicast, Multicast,
# Broadcast) excluded as operationally low-value.
#
# All params interval=0 (passive — one GPV per natural Inform session,
# no Connection Request scheduling).
#
# Scope: any TR-181-capable CPE (matched via dataModel:device label
# written by the CWMP handler's detectDataModels helper — see #321).
# Binds on the first qualifying Inform.
#
# Priority 10 — operator-shipped vendor profiles (typical priority 50+)
# override on conflicting paths.
apiVersion: telemetry.herder.io/v1alpha1
kind: TelemetryProfile
metadata:
  name: tr181-wifi
spec:
  priority: 10
  deviceSelector:
    matchExpressions:
      - key: "dataModel:device"
        operator: Exists
  parameters:
    # --- Radio state ---
    - path: "Device.WiFi.Radio.*.Enable"
      interval: 0
    - path: "Device.WiFi.Radio.*.Status"
      interval: 0
    - path: "Device.WiFi.Radio.*.OperatingFrequencyBand"
      interval: 0
    - path: "Device.WiFi.Radio.*.Channel"
      interval: 0
    - path: "Device.WiFi.Radio.*.OperatingStandards"
      interval: 0
    - path: "Device.WiFi.Radio.*.OperatingChannelBandwidth"
      interval: 0
    # --- Radio byte counters ---
    - path: "Device.WiFi.Radio.*.Stats.BytesSent"
      interval: 0
    - path: "Device.WiFi.Radio.*.Stats.BytesReceived"
      interval: 0
    # --- SSID interface state + byte counters ---
    - path: "Device.WiFi.SSID.*.Enable"
      interval: 0
    - path: "Device.WiFi.SSID.*.Status"
      interval: 0
    - path: "Device.WiFi.SSID.*.SSID"
      interval: 0
    - path: "Device.WiFi.SSID.*.BSSID"
      interval: 0
    - path: "Device.WiFi.SSID.*.LowerLayers"
      interval: 0
    - path: "Device.WiFi.SSID.*.Stats.BytesSent"
      interval: 0
    - path: "Device.WiFi.SSID.*.Stats.BytesReceived"
      interval: 0
    # --- AccessPoint config + security mode ---
    - path: "Device.WiFi.AccessPoint.*.Enable"
      interval: 0
    - path: "Device.WiFi.AccessPoint.*.SSIDReference"
      interval: 0
    - path: "Device.WiFi.AccessPoint.*.SSIDAdvertisementEnabled"
      interval: 0
    - path: "Device.WiFi.AccessPoint.*.Security.ModeEnabled"
      interval: 0
    - path: "Device.WiFi.AccessPoint.*.AssociatedDeviceNumberOfEntries"
      interval: 0
    # --- Associated clients (TR-181 spellings) ---
    - path: "Device.WiFi.AccessPoint.*.AssociatedDevice.*.MACAddress"
      interval: 0
    - path: "Device.WiFi.AccessPoint.*.AssociatedDevice.*.AuthenticationState"
      interval: 0
    - path: "Device.WiFi.AccessPoint.*.AssociatedDevice.*.LastDataDownlinkRate"
      interval: 0
    - path: "Device.WiFi.AccessPoint.*.AssociatedDevice.*.LastDataUplinkRate"
      interval: 0
    - path: "Device.WiFi.AccessPoint.*.AssociatedDevice.*.SignalStrength"
      interval: 0
    - path: "Device.WiFi.AccessPoint.*.AssociatedDevice.*.Active"
      interval: 0
---
# Telemetry profile: TR-181 Ethernet interfaces.
#
# Covers both LAN and WAN Ethernet — TR-181 has no WANDevice.*
# namespace, so the WAN-vs-LAN split is carried by the per-interface
# Upstream boolean flag. Dashboards filter on Upstream=true (WAN)
# vs Upstream=false (LAN) at query time.
#
# Byte counters only (BytesSent/BytesReceived) — packet counters
# (Errors, Discards, Unicast, Multicast, Broadcast) excluded as
# operationally low-value, matching #315's tr098-lan-eth.yaml stance.
#
# All params interval=0 (passive — one GPV per natural Inform session,
# no Connection Request scheduling).
#
# Scope: any TR-181-capable CPE (matched via dataModel:device label
# written by the CWMP handler's detectDataModels helper — see #321).
# Binds on the first qualifying Inform.
#
# Priority 10 — operator-shipped vendor profiles (typical priority 50+)
# override on conflicting paths.
apiVersion: telemetry.herder.io/v1alpha1
kind: TelemetryProfile
metadata:
  name: tr181-ethernet
spec:
  priority: 10
  deviceSelector:
    matchExpressions:
      - key: "dataModel:device"
        operator: Exists
  parameters:
    - path: "Device.Ethernet.Interface.*.Status"
      interval: 0
    - path: "Device.Ethernet.Interface.*.Upstream"
      interval: 0
    - path: "Device.Ethernet.Interface.*.MACAddress"
      interval: 0
    - path: "Device.Ethernet.Interface.*.LowerLayers"
      interval: 0
    - path: "Device.Ethernet.Interface.*.Stats.BytesSent"
      interval: 0
    - path: "Device.Ethernet.Interface.*.Stats.BytesReceived"
      interval: 0
---
# Telemetry profile: TR-181 IP interfaces + IPv4/IPv6 address tables.
#
# Covers L3 IP state for both address families. No TR-098 analog —
# TR-181 distinguishes physical Ethernet (Device.Ethernet.Interface.*)
# from L3 IP (Device.IP.Interface.*), whereas TR-098 bundles L3 into
# WANIPConnection / WANPPPConnection.
#
# Type enum distinguishes Normal / Loopback / Tunnel / Tunneled
# interfaces — dashboards filter on Type=Normal for the real L3
# stack and ignore loopback / tunnel noise.
#
# IPv6Address.Origin enum (DHCPv6 / SLAAC / Static / AutoConfigured /
# etc) lets dashboards tell which IPv6 assignments are real vs
# link-local noise.
#
# All params interval=0 (passive — one GPV per natural Inform session,
# no Connection Request scheduling).
#
# Scope: any TR-181-capable CPE (matched via dataModel:device label
# written by the CWMP handler's detectDataModels helper — see #321).
# Binds on the first qualifying Inform.
#
# Priority 10 — operator-shipped vendor profiles (typical priority 50+)
# override on conflicting paths.
apiVersion: telemetry.herder.io/v1alpha1
kind: TelemetryProfile
metadata:
  name: tr181-ip
spec:
  priority: 10
  deviceSelector:
    matchExpressions:
      - key: "dataModel:device"
        operator: Exists
  parameters:
    # --- IP.Interface state ---
    - path: "Device.IP.Interface.*.Enable"
      interval: 0
    - path: "Device.IP.Interface.*.Status"
      interval: 0
    - path: "Device.IP.Interface.*.Type"
      interval: 0
    - path: "Device.IP.Interface.*.LowerLayers"
      interval: 0
    # --- IPv4 addresses ---
    - path: "Device.IP.Interface.*.IPv4Address.*.IPAddress"
      interval: 0
    - path: "Device.IP.Interface.*.IPv4Address.*.SubnetMask"
      interval: 0
    # --- IPv6 addresses ---
    - path: "Device.IP.Interface.*.IPv6Address.*.IPAddress"
      interval: 0
    - path: "Device.IP.Interface.*.IPv6Address.*.Origin"
      interval: 0
---
# Telemetry profile: TR-181 connected hosts table.
#
# Per-device table of clients currently or recently associated with
# the gateway — wired and wireless. Covers Active flag, hostname, IP,
# MAC, address source, and Layer1/Layer3 interface back-references.
#
# TR-181-vs-TR-098 schema divergences (intentional, documented here
# so operators reading this YAML aren't surprised):
#
#   * PhysAddress (NOT MACAddress) — TR-181 renamed the canonical
#     MAC field on Device.Hosts.Host.*. The legacy MACAddress is
#     absent from TR-181.
#   * Layer1Interface + Layer3Interface (NOT Layer2Interface) —
#     TR-181 split the single Layer2Interface back-reference
#     (from TR-098) into two references. Collect both so dashboards
#     can correlate hosts with WiFi radios (Layer1) AND with IP
#     interfaces (Layer3).
#
# LeaseTimeRemaining deliberately excluded — it counts down every
# second, a poor time-series fit (pure noise in the history
# hypertable). Matches #315's tr098-lan-hosts.yaml exclusion.
#
# All params interval=0 (passive — one GPV per natural Inform session,
# no Connection Request scheduling).
#
# Scope: any TR-181-capable CPE (matched via dataModel:device label
# written by the CWMP handler's detectDataModels helper — see #321).
# Binds on the first qualifying Inform.
#
# Priority 10 — operator-shipped vendor profiles (typical priority 50+)
# override on conflicting paths.
apiVersion: telemetry.herder.io/v1alpha1
kind: TelemetryProfile
metadata:
  name: tr181-hosts
spec:
  priority: 10
  deviceSelector:
    matchExpressions:
      - key: "dataModel:device"
        operator: Exists
  parameters:
    # --- Table cardinality ---
    - path: "Device.Hosts.HostNumberOfEntries"
      interval: 0
    # --- Per-host fields (TR-181 spellings) ---
    - path: "Device.Hosts.Host.*.Active"
      interval: 0
    - path: "Device.Hosts.Host.*.HostName"
      interval: 0
    - path: "Device.Hosts.Host.*.IPAddress"
      interval: 0
    - path: "Device.Hosts.Host.*.PhysAddress"
      interval: 0
    - path: "Device.Hosts.Host.*.AddressSource"
      interval: 0
    - path: "Device.Hosts.Host.*.Layer1Interface"
      interval: 0
    - path: "Device.Hosts.Host.*.Layer3Interface"
      interval: 0
---
apiVersion: telemetry.herder.io/v1alpha1
kind: TelemetryProfile
metadata:
  name: tr181-multiap
spec:
  priority: 10
  deviceSelector:
    matchExpressions:
      - key: "dataModel:device"
        operator: Exists
  parameters:
    - path: "Device.WiFi.MultiAP.APDevice.*.MACAddress"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.Manufacturer"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.ManufacturerOUI"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.ModelName"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.SerialNumber"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.SoftwareVersion"
      interval: 0
    # Backhaul link RSSI from this extender to its parent controller
    # (the gateway). Used by the topology enrichment script to colour
    # the gateway→extender edge by signal strength.
    - path: "Device.WiFi.MultiAP.APDevice.*.SignalStrength"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.Radio.*.Enable"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.Radio.*.OperatingFrequencyBand"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.Radio.*.Channel"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.Radio.*.AP.*.BSSID"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.Radio.*.AP.*.SSID"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.Radio.*.AP.*.AssociatedDevice.*.MACAddress"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.Radio.*.AP.*.AssociatedDevice.*.SignalStrength"
      interval: 0
    - path: "Device.WiFi.MultiAP.APDevice.*.Radio.*.AP.*.AssociatedDevice.*.LastDataDownlinkRate"
      interval: 0
    - path: "Device.WiFi.DataElements.Network.ID"
      interval: 0
    - path: "Device.WiFi.DataElements.Network.ControllerID"
      interval: 0
    - path: "Device.WiFi.DataElements.Network.Device.*.ID"
      interval: 0
    - path: "Device.WiFi.DataElements.Network.Device.*.Manufacturer"
      interval: 0
