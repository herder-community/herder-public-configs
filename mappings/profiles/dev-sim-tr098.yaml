# Reference DeviceProfile for a dev TR-098 CPE simulator.
#
# This profile exists so the dev stack can exercise end-to-end flows
# that require vendor mapping - most importantly the Operations tab
# download/upload diagnostics. Real operators ship their own profiles
# matched against their own vendor/model/firmware fleet and should
# NOT inherit this file as-is.
#
# Selector scope is narrow: only devices with OUI 202BC1 match.
# Update the matchLabels if your simulator uses a different OUI.
name: dev-sim-tr098
priority: 100

deviceSelector:
  matchLabels:
    oui: "202BC1"

parameterMappings:
  - diagnostics-tr098
