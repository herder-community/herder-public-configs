# Profile for the cpe-labs TR-098 simulator
# (github.com/herder-labs/cpe-labs, profile example-tr098-gateway).
#
# Matched on the synthetic ProductClass `GenericIGD` exposed by the
# example-tr098-gateway profile so the same OpenACS dev stack can host
# both genieacs-sim (dev-sim-tr098, OUI 202BC1) and the cpe-sim
# alternate without either profile poaching the other.
#
# Includes all TR-098 mappings so provisioning seed scripts and
# canonical→raw translation work end-to-end.
apiVersion: mapping.herder.io/v1alpha1
kind: MappingProfile
metadata:
  name: cpe-sim-tr098
spec:
  priority: 100
  deviceSelector:
    matchLabels:
      productClass: "GenericIGD"
  parameterMappings:
    - device-info-tr098
    - mgmt-tr098
    - diagnostics-tr098
---
# Profile for the cpe-labs TR-181 simulator
# (github.com/herder-labs/cpe-labs, profile example-tr181-gateway).
#
# Matched on the synthetic ProductClass `GenericGateway` exposed by the
# example-tr181-gateway profile.
#
# Includes the TR-181 device-info and mgmt mappings so provisioning
# seed scripts and canonical→raw translation work end-to-end.
apiVersion: mapping.herder.io/v1alpha1
kind: MappingProfile
metadata:
  name: cpe-sim-tr181
spec:
  priority: 100
  deviceSelector:
    matchLabels:
      productClass: "GenericGateway"
  parameterMappings:
    - device-info-tr181
    - mgmt-tr181
---
# Telemetry add-ons for the cpe-labs TR-098 simulator
# (github.com/herder-labs/cpe-labs, profile example-tr098-gateway).
#
# The bundled tr098-wifi profile deliberately excludes SignalStrength
# because most field TR-098 firmware exposes signal as a vendor
# X_<VENDOR>_SignalStrength extension. The lab simulator emits it on
# the standard SignalStrength path, so add it here scoped to the
# simulator's ProductClass to keep the generic profile clean.
apiVersion: telemetry.herder.io/v1alpha1
kind: TelemetryProfile
metadata:
  name: cpe-sim-tr098-extras
spec:
  priority: 50
  deviceSelector:
    matchLabels:
      productClass: "GenericIGD"
  parameters:
    - path: "InternetGatewayDevice.LANDevice.*.WLANConfiguration.*.AssociatedDevice.*.SignalStrength"
      interval: 0
