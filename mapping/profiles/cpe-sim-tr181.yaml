# Profile for the cpe-labs TR-181 simulator
# (github.com/herder-labs/cpe-labs, profile example-tr181-gateway).
#
# Matched on the synthetic ProductClass `GenericGateway` exposed by the
# example-tr181-gateway profile.
#
# Includes the TR-181 device-info and mgmt mappings so provisioning
# seed scripts and canonical→raw translation work end-to-end.
apiVersion: mapping.herder.io/v1alpha1
kind: MappingProfile
metadata:
  name: cpe-sim-tr181
spec:
  priority: 100
  deviceSelector:
    matchLabels:
      productClass: "GenericGateway"
  parameterMappings:
    - device-info-tr181
    - mgmt-tr181
