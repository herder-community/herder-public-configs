# Canonical → TR-098 management server mappings.
#
# Used by provisioning seed scripts to set connection request credentials
# and periodic inform configuration in a vendor-neutral way.
name: mgmt-tr098

mappings:
  - canonical: canonical.mgmt.connection_request_url
    valueType: string
    devicePath: InternetGatewayDevice.ManagementServer.ConnectionRequestURL

  - canonical: canonical.mgmt.connection_request_username
    valueType: string
    devicePath: InternetGatewayDevice.ManagementServer.ConnectionRequestUsername

  - canonical: canonical.mgmt.connection_request_password
    valueType: string
    devicePath: InternetGatewayDevice.ManagementServer.ConnectionRequestPassword

  - canonical: canonical.mgmt.username
    valueType: string
    devicePath: InternetGatewayDevice.ManagementServer.Username

  - canonical: canonical.mgmt.password
    valueType: string
    devicePath: InternetGatewayDevice.ManagementServer.Password

  - canonical: canonical.mgmt.periodic_inform_enable
    valueType: boolean
    devicePath: InternetGatewayDevice.ManagementServer.PeriodicInformEnable

  - canonical: canonical.mgmt.periodic_inform_interval
    valueType: unsignedint
    devicePath: InternetGatewayDevice.ManagementServer.PeriodicInformInterval

  - canonical: canonical.mgmt.url
    valueType: string
    devicePath: InternetGatewayDevice.ManagementServer.URL

  - canonical: canonical.mgmt.parameter_key
    valueType: string
    devicePath: InternetGatewayDevice.ManagementServer.ParameterKey

  - canonical: canonical.mgmt.provisioning_code
    valueType: string
    devicePath: InternetGatewayDevice.DeviceInfo.ProvisioningCode
