# Canonical → TR-098 device info mappings.
#
# Core device identity and status parameters used by provisioning
# scripts and the platform.
apiVersion: mapping.herder.io/v1alpha1
kind: MappingTable
metadata:
  name: device-info-tr098
spec:
  mappings:
    - canonical: canonical.device.manufacturer
      valueType: string
      devicePath: InternetGatewayDevice.DeviceInfo.Manufacturer
    - canonical: canonical.device.manufacturer_oui
      valueType: string
      devicePath: InternetGatewayDevice.DeviceInfo.ManufacturerOUI
    - canonical: canonical.device.product_class
      valueType: string
      devicePath: InternetGatewayDevice.DeviceInfo.ProductClass
    - canonical: canonical.device.serial_number
      valueType: string
      devicePath: InternetGatewayDevice.DeviceInfo.SerialNumber
    - canonical: canonical.device.hardware_version
      valueType: string
      devicePath: InternetGatewayDevice.DeviceInfo.HardwareVersion
    - canonical: canonical.device.software_version
      valueType: string
      devicePath: InternetGatewayDevice.DeviceInfo.SoftwareVersion
    - canonical: canonical.device.model_name
      valueType: string
      devicePath: InternetGatewayDevice.DeviceInfo.ModelName
    - canonical: canonical.device.description
      valueType: string
      devicePath: InternetGatewayDevice.DeviceInfo.Description
    - canonical: canonical.device.uptime
      valueType: unsignedint
      devicePath: InternetGatewayDevice.DeviceInfo.UpTime
    - canonical: canonical.device.spec_version
      valueType: string
      devicePath: InternetGatewayDevice.DeviceInfo.SpecVersion
