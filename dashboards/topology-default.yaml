# Default per-device topology dashboard (#491).
#
# Single-panel dashboard scoped to gateway-class CPEs (data-model
# membership in either TR-098 `igd` or TR-181 `device`). The
# per-device resolver (#418) auto-resolves this for any subscriber
# CPE that doesn't have a more specific dashboard pinned.
#
# The `topology` datasource is a panel-only marker: the runtime
# `/api/v1/dashboards/query` handler returns 422
# TOPOLOGY_USE_DEVICE_ENDPOINT redirecting to
# `/api/v1/devices/{device_id}/topology`. The panel reads from there
# directly via the `useTopology` hook (#491 §4.1, §4.4).
#
# Selector vocabulary: `dataModel:igd` matches TR-098 gateways;
# `dataModel:device` matches TR-181 gateways. Either qualifies — the
# topology enrichment scripts (#490) handle both shapes
# (easymesh-default.ts for TR-181 EasyMesh, tr098-hosts-only.ts for
# TR-098, arris-hnc.ts for Arris HNC). Operators wanting to scope
# more narrowly can pin a more specific dashboard via the override
# table.
apiVersion: dashboards.herder.io/v1alpha1
kind: Dashboard
metadata:
  name: topology-default
spec:
  title: Device Topology
  description: |
    Operator-facing topology view: gateway → extenders → clients with
    per-edge RSSI overlay (when reported). Auto-resolves on any gateway-
    class CPE (TR-098 `igd` or TR-181 `device`).
  deviceSelector:
    # NOTE: matchExpressions semantics are AND (every expression must
    # be satisfied; backend/internal/mapping/selector/match.go:33). The
    # spec called for "dataModel:igd OR dataModel:device", but that's
    # not directly expressible in one selector — the underlying
    # mechanism gives us AND only. Targeting `dataModel:device` covers
    # TR-181 single-stack and TR-098+TR-181 dual-stack gateways. A
    # paired `topology-default-tr098.yaml` (filed as a follow-up to
    # #491) will match the TR-098-only fleet. Operators wanting earlier
    # coverage on a TR-098 CPE can pin this dashboard via
    # `/api/v1/devices/{id}/dashboard/override`.
    matchExpressions:
      - {key: "dataModel:device", operator: Exists}
  defaultTimeRange:
    from: {kind: relative, expr: "now-1h"}
    to: {kind: relative, expr: "now"}
  defaultRefreshIntervalMs: 30000
  panels:
    - id: panel-topology
      kind: topology
      title: Topology
      description: |
        Live tree of devices on this CPE's network, with per-edge link
        metrics (RSSI by default; the panel options can switch to any
        vendor-emitted metric).
      layout: {x: 0, y: 0, w: 12, h: 16}
      queries:
        - refId: A
          version: 1
          datasource: topology
          query: {}
      config:
        visualization: tree
        overlay:
          field: rssi_dbm
          thresholds:
            - {at: -90, color: "var(--chart-5)"}
            - {at: -70, color: "var(--chart-4)"}
            - {at: -55, color: "var(--chart-2)"}
        showLegend: true
        enableDeepLink: true
