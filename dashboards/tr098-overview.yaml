# Reference dashboard for TR-098-speaking CPEs.
#
# Operator-built dashboards are stored as a Config Service content type
# alongside provisioning / mapping / telemetry / etc. This file is the
# minimal baseline shipped by Herder so the per-device resolver has
# something to resolve to from day one.
#
# Replace the text panel with Line / Bar / Stat / Pie / Gauge / Table
# panels as the panel registry grows. Until then `text` is the only
# registered panel kind.
#
# Selector vocabulary: data-model membership is emitted as exists-style
# keys with empty string values. TR-098 devices report the data model id
# `igd`; TR-181 devices report `device`. Operators target a specific
# data model with `matchExpressions: [{ key: "dataModel:<id>",
# operator: Exists }]`. `matchLabels: { dataModel: tr098 }` does NOT
# work, there is no such key/value pair in the label map.
schemaVersion: 1
name: tr098-overview
title: TR-098 Device Overview
description: |
  Reference dashboard for TR-098-speaking CPEs. Scoped to devices that
  report the TR-098 (`igd`) data model via the `dataModel:igd` exists
  expression.
deviceSelector:
  matchExpressions:
    - { key: "dataModel:igd", operator: Exists }
defaultTimeRange:
  from: { kind: relative, expr: "now-1h" }
  to: { kind: relative, expr: "now" }
defaultRefreshIntervalMs: 60000
panels:
  - id: panel-info
    kind: text
    title: Welcome
    layout: { x: 0, y: 0, w: 12, h: 4 }
    query:
      version: 1
      datasource: device_parameters
      query:
        agg: count
        filters:
          path: "InternetGatewayDevice.DeviceInfo.SoftwareVersion"
    config: {}
